version: "3"

vars:
  MAKEFILE_ICON: " "
  PROJ_NAME: wiki
  WA:
    sh: pwd
  # Default arguments (overridable via environment variables)
  ASCIIDOCTOR_ARGS: "-a relfilesuffix=.html -a project-root={{.WA}} -a docinfodir={{.WA}}/utils/docinfo-local -a docinfo=shared"
  ASCIIDOCTOR_REMOTE_ARGS: "-a relfilesuffix=.html -a project-root={{.WA}} -a docinfodir={{.WA}}/utils/docinfo -a docinfo=shared"
  ASCIIDOCTOR_PDF_ARGS: "-a pdf-theme={{.WA}}/utils/pdf-theme.yml -a project-root={{.WA}}"
  INSTALL_CMD: '{{default "apt-get install -y" .INSTALL_CMD}}'
  OUTPUT_DIR: '{{default "output" .OUTPUT_DIR}}'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all
    silent: true

  clean:
    desc: Remove output and vscode directories
    cmds:
      - rm -rf {{.OUTPUT_DIR}} .vscode/ .task

  index-html:
    desc: Build the main index page
    sources:
      - "*.adoc"
    generates:
      - "{{.OUTPUT_DIR}}/html/index.html"
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}/html
      - asciidoctor *.adoc {{.ASCIIDOCTOR_ARGS}} -D {{.OUTPUT_DIR}}/html

  pages-html:
    desc: Build sub-pages and copy assets
    sources:
      - "Pages/**/*.adoc"
      - "Pages/**/*.svg"
      - "Pages/**/*.png"
      - "Pages/**/*.html"
    generates:
      - "output/html/Pages/**/*"
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}/html/Pages/{About,Network,Workflow,svDV}
      - cp Pages/svDV/DV_ENV.svg {{.OUTPUT_DIR}}/html/Pages/svDV
      - cp Pages/Network/{PG.svg,PPC.svg,PPC.png,pktlib-sim.html} {{.OUTPUT_DIR}}/html/Pages/Network
      - for: [About, Network, Workflow, svDV]
        cmd: asciidoctor Pages/{{.ITEM}}/*.adoc {{.ASCIIDOCTOR_ARGS}} -D {{.OUTPUT_DIR}}/html/Pages/{{.ITEM}}

  html:
    desc: build all html files
    deps:
      - index-html
      - pages-html

  diagram:
    desc: Generate Mermaid and D2 diagrams
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}/html/Pages/Network
      - mmdc -i Pages/Network/ParseGraph.mmd -o {{.OUTPUT_DIR}}/html/Pages/Network/PG.mmd.svg
      - d2 Pages/Network/ParseGraph.d2 {{.OUTPUT_DIR}}/html/Pages/Network/PG.d2.svg

  pdf:
    desc: Generate PDF versions of all documents
    cmds:
      - mkdir -p {{.OUTPUT_DIR}}/pdf/Pages/{About,Network,Workflow,svDV}
      - cp Pages/svDV/DV_ENV.svg {{.OUTPUT_DIR}}/pdf/Pages/svDV
      - cp Pages/Network/PG.svg {{.OUTPUT_DIR}}/pdf/Pages/Network
      - asciidoctor-pdf *.adoc {{.ASCIIDOCTOR_PDF_ARGS}} -D {{.OUTPUT_DIR}}/pdf
      - for: [About, Network, Workflow, svDV]
        cmd: asciidoctor-pdf Pages/{{.ITEM}}/*.adoc {{.ASCIIDOCTOR_PDF_ARGS}} -D {{.OUTPUT_DIR}}/pdf/Pages/{{.ITEM}}

  open:
    desc: Open the generated index in Firefox
    preconditions:
      - sh: test -f {{.OUTPUT_DIR}}/html/index.html
        msg: "index.html not found. Run 'task html' first."
    cmds:
      - firefox -new-window {{.OUTPUT_DIR}}/html/index.html

  install:
    desc: Install dependencies
    cmds:
      - sudo {{.INSTALL_CMD}} asciidoctor gem
      - sudo gem install pygments.rb

  create:
    desc: Quick create/render
    cmds:
      - asciidoctor index.adoc
      - asciidoctor Pages/*/*.adoc {{.ASCIIDOCTOR_REMOTE_ARGS}}
